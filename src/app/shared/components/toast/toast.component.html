<div class="fixed top-4 right-4 z-50 flex flex-col gap-2">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="flex items-center justify-between gap-4 px-4 py-3 rounded-lg shadow-lg text-white text-sm min-w-72 max-w-sm animate-in"
      [class]="toastClasse(toast)"
    >
      <div class="flex items-center gap-2">
        <span>{{ icone(toast) }}</span>
        <span>{{ toast.mensagem }}</span>
      </div>
      <button
        (click)="toastService.dismiss(toast.id)"
        class="text-white/70 hover:text-white transition-colors text-lg leading-none"
      >
        ✕
      </button>
    </div>
  }
</div>
