<div class="min-h-screen bg-gray-100 flex">

  <!-- Overlay mobile -->
  @if (sidebarAberta()) {
    <div
      class="fixed inset-0 z-20 bg-black/40 md:hidden"
      (click)="toggleSidebar()"
    ></div>
  }

  <!-- Sidebar -->
  <aside
    class="fixed z-30 top-0 left-0 h-full w-64 bg-primary-900 text-white flex flex-col transition-transform duration-300 md:translate-x-0"
    [class.-translate-x-full]="!sidebarAberta()"
    [class.translate-x-0]="sidebarAberta()"
  >
    <!-- Logo -->
    <div class="flex items-center gap-3 px-5 py-6 border-b border-primary-700">
      <div class="w-10 h-10 rounded-full bg-primary-600 flex items-center justify-center font-bold text-lg shrink-0">
        CM
      </div>
      <div class="leading-tight">
        <p class="font-semibold text-sm">Câmara Municipal</p>
        <p class="text-primary-300 text-xs">Painel Administrativo</p>
      </div>
    </div>

    <!-- Links -->
    <nav class="flex flex-col gap-1 px-3 py-4 flex-1">
      <a
        routerLink="/admin/dashboard"
        routerLinkActive="bg-primary-700 text-white"
        (click)="sidebarAberta.set(false)"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-primary-200 hover:bg-primary-700 hover:text-white transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Dashboard
      </a>

      <a
        routerLink="/admin/veiculos"
        routerLinkActive="bg-primary-700 text-white"
        (click)="sidebarAberta.set(false)"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-primary-200 hover:bg-primary-700 hover:text-white transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10l2 2h10l2-2z" />
        </svg>
        Veículos
      </a>

      <a
        routerLink="/admin/formularios"
        routerLinkActive="bg-primary-700 text-white"
        (click)="sidebarAberta.set(false)"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-primary-200 hover:bg-primary-700 hover:text-white transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        Formulários
      </a>

      <a
        routerLink="/admin/agendamentos"
        routerLinkActive="bg-primary-700 text-white"
        (click)="sidebarAberta.set(false)"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-primary-200 hover:bg-primary-700 hover:text-white transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        Agendamentos
      </a>

      <a
        routerLink="/admin/relatorios"
        routerLinkActive="bg-primary-700 text-white"
        (click)="sidebarAberta.set(false)"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-primary-200 hover:bg-primary-700 hover:text-white transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
        </svg>
        Relatórios
      </a>
    </nav>

    <!-- Botão sair -->
    <div class="px-3 py-4 border-t border-primary-700">
      <button
        (click)="logout()"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-primary-200 hover:bg-red-700 hover:text-white transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Sair
      </button>
    </div>
  </aside>

  <!-- Conteúdo principal -->
  <div class="flex-1 flex flex-col md:ml-64">

    <!-- Topbar mobile -->
    <header class="md:hidden bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
      <button
        (click)="toggleSidebar()"
        class="text-gray-600 hover:text-gray-800 transition-colors"
        aria-label="Abrir menu"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <span class="font-semibold text-gray-800 text-sm">Painel Administrativo</span>
    </header>

    <!-- Router outlet -->
    <main class="flex-1 p-6">
      <router-outlet />
    </main>

  </div>
</div>
